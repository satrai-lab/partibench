apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-worker
  namespace: edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-worker
  template:
    metadata:
      labels:
        app: edge-worker
    spec:
      nodeSelector:
        testbed-role: Edge
      containers:
      - name: worker
        image: partibench:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 6999
        volumeMounts:
        - name: net-rules
          mountPath: /app/net_rules.tsv
          subPath: net_rules.tsv
      volumes:
      - name: net-rules
        configMap:
          name: edge-net-rules
          optional: true   # pod starts with image's empty net_rules.tsv until run-place creates this
