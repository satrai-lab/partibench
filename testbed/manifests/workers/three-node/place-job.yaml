apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: __JOB_NAMESPACE__
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        testbed-role: __NODE_SELECTOR__
      containers:
      - name: place
        image: pandora-dnn:latest
        imagePullPolicy: Never
        command:
        - python
        - place.py
        - --start-node
        - __START_NODE__
        - --model
        - __MODEL_NAME__
        - --graph
        - /config/cc_graph.gml
        - --bench
        - /config/benchmark.json
        - --strategy
        - auto
        - --placement-method
        - __PLACEMENT_METHOD__
        - --components-out
        - /tmp/partibench-auto-components.json
        - --strategy-out
        - /tmp/partibench-auto-strategy.jsonl
        volumeMounts:
        - name: partibench-auto-place-config
          mountPath: /config
          readOnly: true
      volumes:
      - name: partibench-auto-place-config
        configMap:
          name: __CONFIGMAP_NAME__
