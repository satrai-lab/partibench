apiVersion: v1
kind: Pod
metadata:
  name: benchmark-output-reader-edge
  namespace: edge
spec:
  restartPolicy: Never
  containers:
  - name: reader
    image: busybox:1.36
    command: ["sh", "-c", "ls -lah /output && sleep 3600"]
    volumeMounts:
    - name: output
      mountPath: /output
  volumes:
  - name: output
    persistentVolumeClaim:
      claimName: benchmark-output-pvc-edge