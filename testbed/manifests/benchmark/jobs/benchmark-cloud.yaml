apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-cloud
  namespace: cloud
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        testbed-role: Cloud
      containers:
      - name: benchmark
        image: partibench:latest
        imagePullPolicy: Never
        # profile_model_specifics=False: execution times only (sizes collected from edge).
        command:
          - sh
          - -c
          - "cd /app && python benchmark.py cloud vgg16 False && cp cloud.json /output/cloud.json"
        volumeMounts:
        - name: output-volume
          mountPath: /output
      volumes:
      - name: output-volume
        persistentVolumeClaim:
          claimName: benchmark-output-pvc-cloud
