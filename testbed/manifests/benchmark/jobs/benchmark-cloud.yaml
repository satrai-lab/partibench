apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-cloud
  namespace: cloud
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        testbed-role: Cloud
      containers:
      - name: benchmark
        image: pandora-dnn:latest
        imagePullPolicy: Never
        command: ["python", "benchmark.py", "cloud", "vgg16", "True"]
        volumeMounts:
        - name: output-volume
          mountPath: /output
      volumes:
      - name: output-volume
        persistentVolumeClaim:
          claimName: benchmark-output-pvc-cloud